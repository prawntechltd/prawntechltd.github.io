<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inheritance – Fill in the Gaps</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #5b2d8e;
    --light-purple: #9b59b6;
    --pale: #f3eafd;
    --lavender: #d7bff5;
    --text: #1e1228;
    --correct: #2d6a4f;
    --wrong: #c0392b;
    --neutral: #cdb8e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #f0e6ff 0%, #e8d5fa 100%);
    min-height: 100vh;
    padding: 40px 20px;
    color: var(--text);
  }

  .card {
    max-width: 820px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    padding: 48px 52px;
    box-shadow: 0 8px 40px rgba(91,45,142,0.13);
    border-top: 6px solid var(--purple);
  }

  .badge {
    display: inline-block;
    background: var(--pale);
    color: var(--purple);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
    border: 1px solid var(--lavender);
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 28px;
    color: var(--purple);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 14px;
    color: #7a4daa;
    margin-bottom: 32px;
  }

  .word-bank {
    background: var(--pale);
    border: 1.5px solid var(--lavender);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 32px;
  }

  .word-bank h3 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 12px;
  }

  .words {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .word-chip {
    background: white;
    border: 1.5px solid var(--light-purple);
    color: var(--purple);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .word-chip.used {
    opacity: 0.35;
    text-decoration: line-through;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--light-purple);
    margin-bottom: 6px;
    margin-top: 32px;
  }

  .section-label:first-of-type { margin-top: 0; }

  .paragraph {
    font-family: 'Lora', serif;
    font-size: 17px;
    line-height: 2.3;
    color: var(--text);
    margin-bottom: 10px;
  }

  .gap {
    display: inline-block;
    position: relative;
  }

  .gap input {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-bottom: 2.5px solid var(--neutral);
    background: transparent;
    color: var(--text);
    outline: none;
    padding: 2px 6px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    border-radius: 4px 4px 0 0;
    min-width: 110px;
  }

  .gap input:focus {
    border-bottom-color: var(--light-purple);
    background: #f8f0ff;
  }

  .gap input.correct {
    border-bottom-color: var(--correct);
    color: var(--correct);
    background: #eafaf1;
  }

  .gap input.wrong {
    border-bottom-color: var(--wrong);
    color: var(--wrong);
    background: #fdf2f2;
  }

  .divider {
    border: none;
    border-top: 1.5px dashed var(--lavender);
    margin: 28px 0 20px;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 36px;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  button:active { transform: scale(0.97); }

  .btn-check {
    background: var(--purple);
    color: white;
    box-shadow: 0 4px 16px rgba(91,45,142,0.25);
  }

  .btn-check:hover { box-shadow: 0 6px 20px rgba(91,45,142,0.35); }

  .btn-reset {
    background: white;
    color: var(--purple);
    border: 2px solid var(--purple);
  }

  .btn-reveal {
    background: white;
    color: #888;
    border: 2px solid #ddd;
  }

  .score-bar {
    display: none;
    margin-bottom: 28px;
    background: var(--pale);
    border: 1.5px solid var(--lavender);
    border-radius: 12px;
    padding: 16px 22px;
    font-size: 15px;
    color: var(--purple);
    font-weight: 600;
  }

  .score-bar.show { display: block; }
  .score-bar span { font-size: 22px; }

  @media (max-width: 540px) {
    .card { padding: 30px 24px; }
    h1 { font-size: 22px; }
    .paragraph { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="badge">GCSE Biology</div>
  <h1>Inheritance &amp; Genetics</h1>
  <p class="subtitle">Fill in every gap using the words from the word bank below.</p>

  <div class="word-bank">
    <h3>Word Bank</h3>
    <div class="words" id="wordBank"></div>
  </div>

  <div class="score-bar" id="scoreBar"></div>

  <div id="paragraphs"></div>

  <div class="actions">
    <button class="btn-check" onclick="checkAnswers()">Check Answers</button>
    <button class="btn-reset" onclick="resetAll()">Reset</button>
    <button class="btn-reveal" onclick="revealAll()">Reveal Answers</button>
  </div>
</div>

<script>
// Each section: { label, template, answers[] }
const sections = [
  {
    label: "Part 1 — DNA, Chromosomes & Genes",
    template: `The genetic information of an organism is stored in structures called <gap/>, which are found in the <gap/> of almost every cell. Each chromosome is made up of a long molecule of <gap/>, and specific sections of this molecule that code for particular proteins are called <gap/>. These genes determine the <gap/> — the observable characteristics — of an organism, such as eye colour or blood type.`,
    answers: ["chromosomes", "nucleus", "DNA", "genes", "traits"]
  },
  {
    label: "Part 2 — Alleles & Variation",
    template: `Each gene can exist in different versions known as <gap/>. For most sexually reproducing organisms, cells contain two copies of each chromosome — one inherited from each parent — making them <gap/>. Sex cells, or <gap/>, are different: they contain only one copy of each chromosome and are described as <gap/>. When gametes fuse during <gap/>, the resulting offspring inherits one allele from each parent.`,
    answers: ["alleles", "diploid", "gametes", "haploid", "fertilisation"]
  },
  {
    label: "Part 3 — Homozygous, Heterozygous & Expression",
    template: `When an organism inherits two identical alleles for a gene, it is described as <gap/> for that characteristic. If the two alleles are different, the organism is described as <gap/>. The allele that is always expressed when present — even if only one copy is inherited — is called the <gap/> allele. The allele that is only expressed when two copies are present is described as <gap/>. The combination of alleles an organism carries is called its <gap/>, while the physical characteristics that result from those alleles is called its <gap/>.`,
    answers: ["homozygous", "heterozygous", "dominant", "recessive", "genotype", "phenotype"]
  },
  {
    label: "Part 4 — Inheritance & Punnett Squares",
    template: `The probability of offspring inheriting particular alleles can be predicted using a <gap/> square. By convention, dominant alleles are written as <gap/> letters and recessive alleles as <gap/> letters. An organism that is heterozygous for a recessive condition does not show the condition itself but can pass the recessive allele to its offspring — such an organism is called a <gap/>. When two carriers reproduce, there is a <gap/> in 4 chance that an offspring will inherit two recessive alleles and express the recessive <gap/>.`,
    answers: ["Punnett", "uppercase", "lowercase", "carrier", "1", "trait"]
  }
];

// Flatten all answers into one list for word bank (deduplicated display)
const allAnswers = sections.flatMap(s => s.answers);
const wordBankWords = [...new Set(allAnswers)].sort(() => Math.random() - 0.5);

// Global gap counter
let gapCounter = 0;
// Map from global gap index -> expected answer
const gapAnswerMap = {};

function buildContent() {
  const container = document.getElementById('paragraphs');
  container.innerHTML = '';
  gapCounter = 0;

  sections.forEach((sec, si) => {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = sec.label;
    container.appendChild(label);

    const para = document.createElement('div');
    para.className = 'paragraph';

    const parts = sec.template.split('<gap/>');
    let html = '';
    parts.forEach((part, i) => {
      html += part;
      if (i < parts.length - 1) {
        const idx = gapCounter;
        const ans = sec.answers[i];
        gapAnswerMap[idx] = ans;
        const width = Math.max(90, ans.length * 11 + 24);
        html += `<span class="gap"><input type="text" id="gap${idx}" style="width:${width}px" autocomplete="off" spellcheck="false" oninput="onInput(${idx})"></span>`;
        gapCounter++;
      }
    });

    para.innerHTML = html;
    container.appendChild(para);

    if (si < sections.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      container.appendChild(hr);
    }
  });
}

function buildWordBank() {
  const wb = document.getElementById('wordBank');
  wb.innerHTML = '';
  wordBankWords.forEach(w => {
    const chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.id = 'chip-' + w;
    chip.textContent = w;
    wb.appendChild(chip);
  });
}

function onInput(idx) {
  document.getElementById('gap' + idx).classList.remove('correct', 'wrong');
  updateChips();
}

function updateChips() {
  // For each word in bank, mark used if typed into ANY matching gap
  wordBankWords.forEach(w => {
    const chip = document.getElementById('chip-' + w);
    if (!chip) return;
    let usedCount = 0;
    let expectedCount = 0;
    Object.entries(gapAnswerMap).forEach(([idx, ans]) => {
      if (ans === w) {
        expectedCount++;
        const inp = document.getElementById('gap' + idx);
        if (inp && inp.value.trim().toLowerCase() === w.toLowerCase()) usedCount++;
      }
    });
    chip.classList.toggle('used', usedCount >= expectedCount && expectedCount > 0);
  });
}

function checkAnswers() {
  let correct = 0;
  const total = Object.keys(gapAnswerMap).length;
  Object.entries(gapAnswerMap).forEach(([idx, ans]) => {
    const inp = document.getElementById('gap' + idx);
    if (!inp) return;
    const val = inp.value.trim().toLowerCase();
    if (val === ans.toLowerCase()) {
      inp.classList.add('correct'); inp.classList.remove('wrong'); correct++;
    } else if (val === '') {
      inp.classList.remove('correct', 'wrong');
    } else {
      inp.classList.add('wrong'); inp.classList.remove('correct');
    }
  });
  const bar = document.getElementById('scoreBar');
  bar.classList.add('show');
  const emoji = correct === total ? '🧬 Perfect!' : correct >= total * 0.7 ? '👍 Good effort!' : '🔁 Keep trying!';
  bar.innerHTML = `<span>${correct}/${total}</span> correct &nbsp;&nbsp; ${emoji}`;
}

function resetAll() {
  Object.keys(gapAnswerMap).forEach(idx => {
    const inp = document.getElementById('gap' + idx);
    if (inp) { inp.value = ''; inp.classList.remove('correct', 'wrong'); }
  });
  document.getElementById('scoreBar').classList.remove('show');
  updateChips();
}

function revealAll() {
  Object.entries(gapAnswerMap).forEach(([idx, ans]) => {
    const inp = document.getElementById('gap' + idx);
    if (inp) { inp.value = ans; inp.classList.add('correct'); inp.classList.remove('wrong'); }
  });
  updateChips();
  checkAnswers();
}

buildContent();
buildWordBank();
</script>
</body>
</html>
