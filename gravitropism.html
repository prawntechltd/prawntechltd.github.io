<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravitropism – Fill in the Gaps</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --light-green: #52b788;
    --pale: #d8f3dc;
    --soil: #6b4226;
    --sky: #e8f4f8;
    --text: #1b2d1f;
    --correct: #2d6a4f;
    --wrong: #c0392b;
    --neutral: #c8dfc8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #e8f4f8 0%, #d8f3dc 100%);
    min-height: 100vh;
    padding: 40px 20px;
    color: var(--text);
  }

  .card {
    max-width: 780px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    padding: 48px 52px;
    box-shadow: 0 8px 40px rgba(45,106,79,0.13);
    border-top: 6px solid var(--green);
  }

  .badge {
    display: inline-block;
    background: var(--pale);
    color: var(--green);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 28px;
    color: var(--green);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 14px;
    color: #5a7a62;
    margin-bottom: 32px;
  }

  .word-bank {
    background: var(--pale);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 32px;
  }

  .word-bank h3 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 12px;
  }

  .words {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .word-chip {
    background: white;
    border: 1.5px solid var(--light-green);
    color: var(--green);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .word-chip.used {
    opacity: 0.35;
    text-decoration: line-through;
  }

  .paragraph {
    font-family: 'Lora', serif;
    font-size: 17px;
    line-height: 2.2;
    color: var(--text);
    margin-bottom: 36px;
  }

  .gap {
    display: inline-block;
    position: relative;
  }

  .gap input {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-bottom: 2.5px solid var(--neutral);
    background: transparent;
    color: var(--text);
    outline: none;
    padding: 2px 6px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    border-radius: 4px 4px 0 0;
    min-width: 110px;
  }

  .gap input:focus {
    border-bottom-color: var(--light-green);
    background: #f0faf3;
  }

  .gap input.correct {
    border-bottom-color: var(--correct);
    color: var(--correct);
    background: #eafaf1;
  }

  .gap input.wrong {
    border-bottom-color: var(--wrong);
    color: var(--wrong);
    background: #fdf2f2;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  button:active { transform: scale(0.97); }

  .btn-check {
    background: var(--green);
    color: white;
    box-shadow: 0 4px 16px rgba(45,106,79,0.25);
  }

  .btn-check:hover { box-shadow: 0 6px 20px rgba(45,106,79,0.35); }

  .btn-reset {
    background: white;
    color: var(--green);
    border: 2px solid var(--green);
  }

  .btn-reveal {
    background: white;
    color: #888;
    border: 2px solid #ddd;
  }

  .score-bar {
    display: none;
    margin-bottom: 28px;
    background: var(--pale);
    border-radius: 12px;
    padding: 16px 22px;
    font-size: 15px;
    color: var(--green);
    font-weight: 600;
  }

  .score-bar.show { display: block; }

  .score-bar span { font-size: 22px; }

  @media (max-width: 540px) {
    .card { padding: 30px 24px; }
    h1 { font-size: 22px; }
    .paragraph { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="badge">GCSE Biology</div>
  <h1>Gravitropism &amp; Auxins</h1>
  <p class="subtitle">Fill in every gap using the words from the word bank below.</p>

  <div class="word-bank">
    <h3>Word Bank</h3>
    <div class="words" id="wordBank">
      <!-- chips injected by JS -->
    </div>
  </div>

  <div class="score-bar" id="scoreBar"></div>

  <div class="paragraph" id="paragraph"></div>

  <div class="actions">
    <button class="btn-check" onclick="checkAnswers()">Check Answers</button>
    <button class="btn-reset" onclick="resetAll()">Reset</button>
    <button class="btn-reveal" onclick="revealAll()">Reveal Answers</button>
  </div>
</div>

<script>
const answers = [
  "gravity",
  "gravitropism",
  "auxin",
  "lower",
  "elongate",
  "downwards",
  "positive",
  "shoots",
  "upper",
  "inhibits",
  "upwards",
  "negative"
];

// Scrambled word bank display order
const wordBankWords = [...answers].sort(() => Math.random() - 0.5);

const template = `
Plants are able to detect and respond to the direction of <gap/> through a process called <gap/>. 
This response is controlled by a plant hormone called <gap/>, which is produced at the tip of roots and shoots and moves 
to the <gap/> side of the organ when the plant is positioned horizontally. 
In roots, this unequal distribution of auxin causes cells on the lower side to <gap/> less, 
bending the root <gap/>. This means roots show <gap/> gravitropism — they grow in the same direction as gravity. 
In <gap/>, however, auxin accumulates on the lower side and causes cells on the <gap/> side to elongate less. 
This is because high concentrations of auxin actually <gap/> growth in root cells, while promoting it in shoot cells. 
As a result, the shoot bends <gap/>, showing <gap/> gravitropism — growing in the opposite direction to gravity.
`;

let gapIndex = 0;

function buildParagraph() {
  gapIndex = 0;
  const parts = template.split('<gap/>');
  let html = '';
  parts.forEach((part, i) => {
    html += part;
    if (i < parts.length - 1) {
      const idx = gapIndex++;
      const w = answers[idx];
      const width = Math.max(80, w.length * 11 + 20);
      html += `<span class="gap"><input type="text" id="gap${idx}" data-answer="${w}" style="width:${width}px" autocomplete="off" spellcheck="false" oninput="onInput(${idx})"></span>`;
    }
  });
  document.getElementById('paragraph').innerHTML = html;
}

function buildWordBank() {
  const wb = document.getElementById('wordBank');
  wb.innerHTML = '';
  wordBankWords.forEach(w => {
    const chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.id = 'chip-' + w;
    chip.textContent = w;
    wb.appendChild(chip);
  });
}

function onInput(idx) {
  const input = document.getElementById('gap' + idx);
  input.classList.remove('correct', 'wrong');
  updateChips();
}

function updateChips() {
  // Mark chips as used if their word is typed anywhere
  wordBankWords.forEach(w => {
    const chip = document.getElementById('chip-' + w);
    if (!chip) return;
    let used = false;
    answers.forEach((ans, i) => {
      if (ans === w) {
        const inp = document.getElementById('gap' + i);
        if (inp && inp.value.trim().toLowerCase() === w.toLowerCase()) used = true;
      }
    });
    chip.classList.toggle('used', used);
  });
}

function checkAnswers() {
  let correct = 0;
  answers.forEach((ans, i) => {
    const inp = document.getElementById('gap' + i);
    if (!inp) return;
    const val = inp.value.trim().toLowerCase();
    if (val === ans.toLowerCase()) {
      inp.classList.add('correct');
      inp.classList.remove('wrong');
      correct++;
    } else if (val === '') {
      inp.classList.remove('correct', 'wrong');
    } else {
      inp.classList.add('wrong');
      inp.classList.remove('correct');
    }
  });
  const bar = document.getElementById('scoreBar');
  bar.classList.add('show');
  const emoji = correct === answers.length ? '🌱 Perfect!' : correct >= answers.length * 0.7 ? '👍 Good effort!' : '🔁 Keep trying!';
  bar.innerHTML = `<span>${correct}/${answers.length}</span> correct &nbsp;&nbsp; ${emoji}`;
}

function resetAll() {
  answers.forEach((_, i) => {
    const inp = document.getElementById('gap' + i);
    if (inp) { inp.value = ''; inp.classList.remove('correct', 'wrong'); }
  });
  document.getElementById('scoreBar').classList.remove('show');
  updateChips();
}

function revealAll() {
  answers.forEach((ans, i) => {
    const inp = document.getElementById('gap' + i);
    if (inp) { inp.value = ans; inp.classList.add('correct'); inp.classList.remove('wrong'); }
  });
  updateChips();
  checkAnswers();
}

buildParagraph();
buildWordBank();
</script>
</body>
</html>
